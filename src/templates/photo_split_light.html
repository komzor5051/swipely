<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 1080px;
      height: 1350px;
      overflow: hidden;
      font-family: 'Inter', -apple-system, sans-serif;
      display: flex;
      flex-direction: column;
    }

    .photo-zone {
      width: 1080px;
      height: 702px;
      flex-shrink: 0;
      position: relative;
      background-size: cover;
      background-position: center;
      background-image: url('{{PHOTO_URL}}');
      order: {{PHOTO_ORDER_TOP}};
    }

    .text-zone {
      width: 1080px;
      height: 648px;
      flex-shrink: 0;
      background: #F5F3EE;
      padding: 52px 64px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      position: relative;
      order: {{PHOTO_ORDER_BOTTOM}};
    }

    .photo-zone.hidden { display: none; }
    .text-zone.full-height {
      height: 1350px;
      padding: 80px 64px;
    }

    .slide-counter {
      position: absolute;
      top: 28px;
      right: 36px;
      font-size: 20px;
      font-weight: 600;
      color: #fff;
      background: rgba(0,0,0,0.45);
      padding: 6px 16px;
      border-radius: 100px;
    }

    .slide-counter.no-photo {
      color: #C4BFB6;
      background: transparent;
    }

    h2 {
      font-family: 'Inter', sans-serif;
      font-size: 72px;
      font-weight: 800;
      color: #1A1A18;
      line-height: 1.1;
      letter-spacing: -1.5px;
      margin-bottom: 28px;
      word-wrap: break-word;
      overflow-wrap: anywhere;
      max-width: 95%;
    }

    .content {
      font-family: 'Inter', sans-serif;
      font-size: 28px;
      font-weight: 400;
      color: #5E5B54;
      line-height: 1.65;
    }

    .username {
      position: absolute;
      bottom: 28px;
      right: 40px;
      font-family: 'Inter', sans-serif;
      font-size: 18px;
      font-weight: 600;
      color: #B0A89C;
      letter-spacing: 0.2px;
    }
  </style>
</head>
<body>

<div class="photo-zone {{PHOTO_HIDDEN}}">
  <div class="slide-counter">{{SLIDE_NUMBER}}/{{TOTAL_SLIDES}}</div>
</div>

<div class="text-zone {{TEXT_FULL_HEIGHT}}">
  {{NO_PHOTO_COUNTER}}
  <h2>{{TITLE}}</h2>
  <div class="content">{{CONTENT}}</div>
  {{USERNAME}}
</div>

</body>
</html>
