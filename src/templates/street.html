<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;500&family=Barlow+Condensed:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --black: #0A0A0A;
      --white: #F4F3F1;
      --red: #E8001D;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 1080px;
      height: 1350px;
      background: var(--white);
      font-family: 'Barlow', sans-serif;
      display: flex;
      flex-direction: column;
      padding: 72px 92px 80px;
      position: relative;
      overflow: hidden;
    }

    /* Grain texture */
    body::after {
      content: '';
      position: absolute;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='g'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3CfeColorMatrix type='saturate' values='0'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23g)'/%3E%3C/svg%3E");
      opacity: 0.028;
      pointer-events: none;
      z-index: 100;
    }

    /* COUNTER — right-aligned, no Drop label */
    .counter-row {
      display: flex;
      justify-content: flex-end;
    }

    .counter {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 22px;
      font-weight: 400;
      letter-spacing: 4px;
      color: #ADADAD;
      text-transform: uppercase;
    }

    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 40px 0 0;
    }

    .title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 112px;
      line-height: 1.0;
      letter-spacing: 2px;
      color: var(--black);
      text-transform: uppercase;
      margin-bottom: 52px;
      overflow-wrap: normal;
      word-break: keep-all;
    }

    .title hl,
    .title .hl {
      font-style: italic;
      color: var(--red);
    }

    .rule {
      width: 100%;
      height: 2px;
      background: var(--black);
      margin-bottom: 52px;
      flex-shrink: 0;
    }

    .content {
      font-family: 'Barlow', sans-serif;
      font-size: 44px;
      font-weight: 300;
      line-height: 1.65;
      color: var(--black);
      letter-spacing: 0.2px;
      max-width: 870px;
    }

    /* ── HOOK SLIDE (slide 1) ── */
    body.is-hook {
      background: var(--black);
    }

    body.is-hook .counter {
      color: #3C3C3C;
    }

    body.is-hook .main {
      padding-top: 48px;
    }

    body.is-hook .title {
      font-size: 138px;
      line-height: 0.95;
      color: var(--white);
      margin-bottom: 56px;
    }

    body.is-hook .rule {
      width: 55%;
      height: 3px;
      background: var(--white);
      margin-bottom: 48px;
    }

    body.is-hook .content {
      font-size: 42px;
      color: rgba(244, 243, 241, 0.72);
    }
  </style>
</head>
<body>

  <div class="counter-row">
    <span class="counter" id="slide-counter">{{SLIDE_NUMBER}}&nbsp;&nbsp;/&nbsp;&nbsp;{{TOTAL_SLIDES}}</span>
  </div>

  <div class="main">
    <h1 class="title">{{TITLE}}</h1>
    <div class="rule"></div>
    <p class="content">{{CONTENT}}</p>
  </div>

  <script>
    var counter = document.getElementById('slide-counter');
    if (counter && parseInt(counter.textContent) === 1) {
      document.body.classList.add('is-hook');
    }
  </script>

</body>
</html>
